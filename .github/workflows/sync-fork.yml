name: Sync to fork
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git remote add fork https://x-access-token:${{ secrets.FORK_PAT }}@github.com/slaterlucas/GoGoCity.git
          git push fork main --force
